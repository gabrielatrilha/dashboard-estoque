<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Estoque Emultec por Estado — 18/06/2026</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Segoe UI', Arial, sans-serif; background: #f5f6f8; color: #1a1a1a; padding: 24px; }
#login-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 80vh; }
#login-screen h2 { font-size: 20px; color: #1f4e79; margin-bottom: 6px; }
#login-screen p { font-size: 13px; color: #888; margin-bottom: 20px; }
#login-screen input { padding: 10px 16px; font-size: 14px; border: 1px solid #ccc; border-radius: 6px; width: 260px; margin-bottom: 12px; font-family: inherit; }
#login-screen input:focus { outline: none; border-color: #1f4e79; }
#login-screen button { padding: 10px 24px; font-size: 14px; background: #1f4e79; color: #fff; border: none; border-radius: 6px; cursor: pointer; font-family: inherit; }
#login-screen button:hover { background: #163a5c; }
#login-screen .error { color: #d32f2f; font-size: 12px; margin-top: 8px; display: none; }
#app { display: none; }
h1 { font-size: 20px; font-weight: 600; margin-bottom: 4px; color: #1f4e79; }
.subtitle { font-size: 13px; color: #888; margin-bottom: 20px; }
.section-label { font-size: 12px; color: #777; margin-bottom: 6px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.5px; }
.btn-group { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 16px; }
.btn { font-size: 12px; padding: 6px 14px; border-radius: 6px; border: 1px solid #ccc; background: #fff; color: #555; cursor: pointer; transition: all 0.15s; font-family: inherit; }
.btn:hover { background: #eef3f9; border-color: #aaa; }
.btn.active { background: #1f4e79; color: #fff; border-color: #1f4e79; font-weight: 600; }
.btn .dot { display: inline-block; width: 8px; height: 8px; border-radius: 2px; margin-right: 5px; vertical-align: middle; }
.controls { display: flex; align-items: center; gap: 16px; margin-bottom: 12px; }
.controls label { font-size: 12px; color: #777; display: flex; align-items: center; gap: 4px; cursor: pointer; }
.count { font-size: 12px; color: #aaa; margin-left: auto; }
table { width: 100%; border-collapse: collapse; background: #fff; border-radius: 8px; overflow: hidden; box-shadow: 0 1px 4px rgba(0,0,0,0.06); }
thead th { background: #1f4e79; color: #fff; font-weight: 500; font-size: 12px; padding: 10px 8px; text-align: left; }
thead th.num { text-align: right; }
tbody td { padding: 7px 8px; font-size: 12px; border-bottom: 1px solid #eee; }
tbody td.num { text-align: right; font-variant-numeric: tabular-nums; }
tbody td.fam { font-weight: 600; font-size: 11px; }
tbody td.cod { font-family: 'Consolas', 'Courier New', monospace; font-size: 11px; }
tbody tr.fam-start td { border-top: 2px solid #d0dbe6; }
tbody tr:hover td { background: #f0f5fa; }
tfoot td { background: #1f4e79; color: #fff; font-weight: 600; font-size: 12px; padding: 10px 8px; }
tfoot td.num { text-align: right; }
.dash { color: #ccc; }
.summary { display: flex; gap: 12px; margin-bottom: 20px; flex-wrap: wrap; }
.card { background: #fff; border-radius: 8px; padding: 12px 16px; box-shadow: 0 1px 4px rgba(0,0,0,0.06); min-width: 120px; }
.card-label { font-size: 11px; color: #888; margin-bottom: 2px; }
.card-value { font-size: 22px; font-weight: 600; color: #1f4e79; }
@media print {
  body { padding: 10px; background: #fff; }
  .btn-group, .controls, .no-print { display: none !important; }
  table { box-shadow: none; }
}
</style>
</head>
<body>

<div id="login-screen">
  <h2>Estoque Emultec</h2>
  <p>Digite a senha para acessar o relatório</p>
  <input type="password" id="pwd" placeholder="Senha" onkeydown="if(event.key==='Enter')checkPwd()">
  <button onclick="checkPwd()">Entrar</button>
  <span class="error" id="pwd-error">Senha incorreta</span>
</div>

<div id="app">
<h1>Relatório de Estoque por Estado</h1>
<p class="subtitle">Fonte: bi.emultec.com.br — estoque_analítico (Locais) — 18/06/2026</p>

<div class="summary" id="summary"></div>

<p class="section-label">Estado</p>
<div class="btn-group" id="estBtns">
  <button class="btn active" data-val="ALL">Todos</button>
  <button class="btn" data-val="rs"><span class="dot" style="background:#3266ad"></span>RS (C61)</button>
  <button class="btn" data-val="sc"><span class="dot" style="background:#1D9E75"></span>SC (C67)</button>
  <button class="btn" data-val="sp"><span class="dot" style="background:#D85A30"></span>SP (C63)</button>
  <button class="btn" data-val="pr"><span class="dot" style="background:#7F77DD"></span>PR (C64)</button>
</div>

<p class="section-label">Família</p>
<div class="btn-group" id="famBtns">
  <button class="btn active" data-val="ALL">Todas</button>
</div>

<div class="controls no-print">
  <label><input type="checkbox" id="hideZero" checked> Ocultar zerados</label>
  <span class="count" id="countLabel"></span>
</div>

<div id="tableWrap"></div>

<script>
const allData = [
  {f:"ANASTOMAT",cod:"ZSR-DCA-12C",d:"Circuncisão 12C",rs:1,sc:0,sp:0,pr:2},
  {f:"ANASTOMAT",cod:"ZSR-DCA-14C",d:"Circuncisão 14C",rs:1,sc:0,sp:2,pr:2},
  {f:"ANASTOMAT",cod:"ZSR-DCA-16C",d:"Circuncisão 16C",rs:1,sc:0,sp:3,pr:2},
  {f:"ANASTOMAT",cod:"ZSR-DCA-18C",d:"Circuncisão 18C",rs:5,sc:6,sp:3,pr:3},
  {f:"ANASTOMAT",cod:"ZSR-DCA-22C",d:"Circuncisão 22C",rs:5,sc:10,sp:6,pr:5},
  {f:"ANASTOMAT",cod:"ZSR-DCA-26C",d:"Circuncisão 26C",rs:5,sc:10,sp:4,pr:5},
  {f:"ANASTOMAT",cod:"ZSR-DCA-30C",d:"Circuncisão 30C",rs:7,sc:10,sp:7,pr:4},
  {f:"ANASTOMAT",cod:"ZSR-DCA-34C",d:"Circuncisão 34C",rs:5,sc:8,sp:6,pr:5},
  {f:"CALIBER",cod:"VCB-10X8",d:"Membrana Reconstrutora",rs:1,sc:0,sp:1,pr:3},
  {f:"ELEFANT",cod:"ASP165",d:"Cânula Irrigação 35cm",rs:5,sc:2,sp:4,pr:3},
  {f:"ELEFANT",cod:"ASP185",d:"Cânula Irrigação 45cm",rs:292,sc:19,sp:90,pr:17},
  {f:"INFRA",cod:"ES2814",d:"Prótese Titan Infrapubic 14cm",rs:2,sc:0,sp:1,pr:0},
  {f:"INFRA",cod:"ES2816",d:"Prótese Titan Infrapubic 16cm",rs:4,sc:0,sp:1,pr:0},
  {f:"INFRA",cod:"ES2818",d:"Prótese Titan Infrapubic 18cm",rs:3,sc:0,sp:2,pr:1},
  {f:"INFRA",cod:"ES2820",d:"Prótese Titan Infrapubic 20cm",rs:1,sc:0,sp:1,pr:0},
  {f:"INFRA",cod:"ES2822",d:"Prótese Titan Infrapubic 22cm",rs:3,sc:0,sp:1,pr:0},
  {f:"INTRUM. GENESIS",cod:"39801-MCC",d:"Medidor Corpo Cavernoso",rs:7,sc:0,sp:0,pr:0},
  {f:"INTRUM. GENESIS",cod:"EXTENSORES",d:"Extensores Genesis",rs:1,sc:0,sp:0,pr:0},
  {f:"INTRUM. TITAN",cod:"AFASTADOR L.STAR",d:"Afastador Lone Star",rs:3,sc:0,sp:0,pr:0},
  {f:"INTRUM. TITAN",cod:"DILATADORES BROOKS",d:"Kit Dilatadores Brooks",rs:4,sc:0,sp:0,pr:0},
  {f:"INTRUM. TITAN",cod:"KITINSTRTITAN",d:"Kit Instrumentos Titan",rs:3,sc:0,sp:0,pr:2},
  {f:"INTRUM. TITAN",cod:"QB55552",d:"Furlow Inserter",rs:11,sc:0,sp:0,pr:0},
  {f:"INTRUM. TITAN",cod:"QB5558",d:"Kit Dilatadores Rossello",rs:2,sc:0,sp:2,pr:0},
  {f:"KIT DE MONTAGEM",cod:"519150",d:"Kit Montagem s/ Extensor",rs:0,sc:1,sp:1,pr:1},
  {f:"KIT DE MONTAGEM",cod:"519170",d:"Kit Montagem Titan",rs:9,sc:1,sp:3,pr:2},
  {f:"KIT DE MONTAGEM",cod:"519310",d:"Extensor Prótese Titan 0,5",rs:6,sc:1,sp:1,pr:1},
  {f:"MALEAVEL",cod:"519250",d:"Implante Maleável Genesis 9,5mm",rs:15,sc:2,sp:3,pr:6},
  {f:"MALEAVEL",cod:"519260",d:"Implante Maleável Genesis 11mm",rs:21,sc:2,sp:3,pr:6},
  {f:"MALEAVEL",cod:"519270",d:"Implante Maleável Genesis 13mm",rs:9,sc:1,sp:3,pr:6},
  {f:"NARROW INFRA",cod:"519300",d:"Narrow Kit Montagem Titan",rs:2,sc:1,sp:0,pr:0},
  {f:"NARROW INFRA",cod:"EN2814",d:"Prótese NB Infra 14cm",rs:1,sc:0,sp:0,pr:0},
  {f:"NARROW INFRA",cod:"EN2816",d:"Prótese NB Infra 16cm",rs:1,sc:0,sp:0,pr:0},
  {f:"NARROW INFRA",cod:"EN2818",d:"Prótese NB Infra 18cm",rs:1,sc:0,sp:0,pr:0},
  {f:"PENO",cod:"E17924",d:"Prótese Titan Escrotal 24cm",rs:1,sc:0,sp:0,pr:0},
  {f:"PENO",cod:"ES2914",d:"Prótese Titan Escrotal 14cm",rs:0,sc:0,sp:2,pr:2},
  {f:"PENO",cod:"ES2916",d:"Prótese Titan Escrotal 16cm",rs:2,sc:1,sp:3,pr:2},
  {f:"PENO",cod:"ES2918",d:"Prótese Titan Escrotal 18cm",rs:1,sc:0,sp:1,pr:0},
  {f:"PENO",cod:"ES2920",d:"Prótese Titan Escrotal 20cm",rs:2,sc:1,sp:3,pr:1},
  {f:"PENO",cod:"ES2922",d:"Prótese Titan Escrotal 22cm",rs:0,sc:0,sp:1,pr:0},
  {f:"RESERVATORIO",cod:"ER8075",d:"Reservatório OTR 75cc",rs:3,sc:1,sp:3,pr:4},
  {f:"RESERVATORIO",cod:"ER8125",d:"Reservatório OTR 125cc",rs:16,sc:0,sp:3,pr:1},
  {f:"UROLIFT",cod:"787.050",d:"Cesto Processamento Urolift",rs:0,sc:0,sp:0,pr:1},
  {f:"UROLIFT",cod:"UL-SCOPE",d:"Cistoscópio 2,9mm",rs:13,sc:3,sp:0,pr:2},
  {f:"UROLIFT",cod:"UL-SHEATH",d:"Bainha 20 FR",rs:3,sc:1,sp:0,pr:1},
  {f:"UROLIFT",cod:"UL-TRAY",d:"Cesto Processamento",rs:3,sc:1,sp:0,pr:0},
  {f:"UROLIFT",cod:"UL-VO",d:"Obturador Visual",rs:3,sc:1,sp:0,pr:1},
  {f:"UROLIFT",cod:"UL400-AM",d:"System Implante Urológico",rs:22,sc:32,sp:12,pr:4}
];

const familias = [...new Set(allData.map(d=>d.f))];
const famWrap = document.getElementById('famBtns');
familias.forEach(f => {
  const b = document.createElement('button');
  b.className = 'btn';
  b.dataset.val = f;
  b.textContent = f;
  famWrap.appendChild(b);
});

let selEst = 'ALL', selFam = 'ALL';

document.getElementById('estBtns').addEventListener('click', e => {
  const btn = e.target.closest('.btn');
  if (!btn) return;
  selEst = btn.dataset.val;
  document.querySelectorAll('#estBtns .btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  render();
});

document.getElementById('famBtns').addEventListener('click', e => {
  const btn = e.target.closest('.btn');
  if (!btn) return;
  selFam = btn.dataset.val;
  document.querySelectorAll('#famBtns .btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  render();
});

document.getElementById('hideZero').addEventListener('change', render);

function render() {
  const hideZero = document.getElementById('hideZero').checked;
  let data = selFam === 'ALL' ? [...allData] : allData.filter(d=>d.f===selFam);
  data.sort((a,b) => {
    if (a.f !== b.f) return a.f.localeCompare(b.f);
    const na = parseFloat((a.d.match(/(\d+[\.,]?\d*)\s*(cm|C|mm)?/i)||[])[1]) || 0;
    const nb = parseFloat((b.d.match(/(\d+[\.,]?\d*)\s*(cm|C|mm)?/i)||[])[1]) || 0;
    if (na !== nb) return na - nb;
    return a.d.localeCompare(b.d);
  });
  const showAll = selEst === 'ALL';
  const states = showAll ? ['rs','sc','sp','pr'] : [selEst];
  const sLabels = {rs:'RS',sc:'SC',sp:'SP',pr:'PR'};
  const sColors = {rs:'#3266ad',sc:'#1D9E75',sp:'#D85A30',pr:'#7F77DD'};

  if (hideZero) {
    data = showAll ? data.filter(d=>(d.rs+d.sc+d.sp+d.pr)>0) : data.filter(d=>d[selEst]>0);
  }

  // Summary cards
  const totByState = {rs:0,sc:0,sp:0,pr:0};
  data.forEach(d => { totByState.rs+=d.rs; totByState.sc+=d.sc; totByState.sp+=d.sp; totByState.pr+=d.pr; });
  const sumHTML = states.map(s =>
    '<div class="card"><div class="card-label">'+sLabels[s]+'</div><div class="card-value" style="color:'+sColors[s]+'">'+totByState[s]+'</div></div>'
  ).join('') + '<div class="card"><div class="card-label">Total</div><div class="card-value">'+(states.reduce((s,k)=>s+totByState[k],0))+'</div></div>';
  document.getElementById('summary').innerHTML = sumHTML;
  document.getElementById('countLabel').textContent = data.length + ' produtos';

  let currentFam = '';
  let html = '<table><thead><tr><th>Família</th><th>Código</th><th>Descrição</th>';
  states.forEach(s => { html += '<th class="num" style="min-width:60px;">'+sLabels[s]+'</th>'; });
  html += '<th class="num">Total</th></tr></thead><tbody>';

  const totals = {}; states.forEach(s=>totals[s]=0); let gt=0;

  data.forEach(r => {
    const t = states.reduce((sum,s)=>sum+r[s],0);
    states.forEach(s=>totals[s]+=r[s]); gt+=t;
    const nf = r.f!==currentFam; if(nf) currentFam=r.f;
    html += '<tr class="'+(nf?'fam-start':'')+'">';
    html += '<td class="fam">'+(nf?r.f:'')+'</td>';
    html += '<td class="cod">'+r.cod+'</td>';
    html += '<td>'+r.d+'</td>';
    states.forEach(s => { html += '<td class="num">'+(r[s]||'<span class="dash">-</span>')+'</td>'; });
    html += '<td class="num" style="font-weight:600;">'+t+'</td></tr>';
  });

  html += '</tbody><tfoot><tr><td colspan="3">Total</td>';
  states.forEach(s => { html += '<td class="num">'+totals[s]+'</td>'; });
  html += '<td class="num">'+gt+'</td></tr></tfoot></table>';

  if (!data.length) html = '<p style="padding:20px;color:#aaa;">Nenhum produto com saldo para este filtro.</p>';
  document.getElementById('tableWrap').innerHTML = html;
}

render();
</script>
</div>

<script>
function checkPwd() {
  var p = document.getElementById('pwd').value;
  if (btoa(p) === 'bWFnbnVtQGVzdG9xdWU=') {
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('app').style.display = 'block';
  } else {
    document.getElementById('pwd-error').style.display = 'block';
    document.getElementById('pwd').value = '';
  }
}
</script>
</body>
</html>
